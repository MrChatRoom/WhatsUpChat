<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global Chatroom</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">

</div>

<script src="script.js"></script>
</body>
</html>
