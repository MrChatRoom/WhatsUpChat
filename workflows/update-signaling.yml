name: Update Signaling

on:
  schedule:
    - cron: '*/1 * * * *' 
  workflow_dispatch:

jobs:
  reset-signaling:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Reset signaling
      run: |
        echo '{"offers":[],"answers":[]}' > signaling.json
    - name: Commit & Push
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add signaling.json
        git commit -m "Reset signaling"
        git push